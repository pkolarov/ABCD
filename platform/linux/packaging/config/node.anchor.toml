# DDS Linux anchor node configuration template.
# Replace domain placeholders during bootstrap/provisioning.

data_dir = "/var/lib/dds/node"
org_hash = "__ORG_HASH__"
trusted_roots = [__TRUSTED_ROOTS__]

[network]
listen_addr = "/ip4/0.0.0.0/tcp/4001"
bootstrap_peers = []
mdns_enabled = true
heartbeat_secs = 5
idle_timeout_secs = 60
api_addr = "unix:/run/dds/api.sock"
metrics_addr = "127.0.0.1:9495"

[network.api_auth]
trust_loopback_tcp_admin = false
strict_device_binding = true

[domain]
name = "__DOMAIN_NAME__"
id = "__DOMAIN_ID__"
pubkey = "__DOMAIN_PUBKEY__"
# PQ-by-default: hybrid (Ed25519 + ML-DSA-65) domain, populated from
# `dds-node init-domain` output. Required when the domain is hybrid;
# omit only on a legacy Ed25519-only domain.
pq_pubkey = "__DOMAIN_PQ_PUBKEY__"
admission_path = "/var/lib/dds/node/admission.cbor"
audit_log_enabled = false
# `capabilities` defaults to ["enc-v3"] (encrypted gossip on); explicit
# here for visibility. Set to [] only on a legacy plaintext-gossip
# domain (not recommended).
capabilities = ["enc-v3"]
