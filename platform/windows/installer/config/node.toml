# DDS Node Configuration
# Installed to: C:\Program Files\DDS\config\node.toml
# Edit this file to configure the DDS node service.

# Data directory for vault, certificates, and replication state
data_dir = 'C:\ProgramData\DDS'

[network]
# HTTP API listen address (used by Auth Bridge and Policy Agent).
# **A-2 (security review)**: the MSI now writes
# HKLM\SOFTWARE\DDS\AuthBridge\ApiAddr = "pipe:dds-api" by default and
# matching values into the Policy Agent's appsettings.json, so the Rust
# node ships the named-pipe listener as the supported transport. Change
# this to `127.0.0.1:5551` only if you need the legacy loopback-TCP path
# (and re-enable trust_loopback_tcp_admin in [network.api_auth]).
api_addr = 'pipe:dds-api'

# P2P listen addresses (multiaddr format).
# listen_addr = '/ip4/0.0.0.0/tcp/4001'

[network.api_auth]
# **H-6 step-2 (security review)** — per-install HMAC secret used to
# sign every HTTP response body. The MSI provisions this file via the
# `gen-hmac-secret` custom action; the Auth Bridge reads the same
# file via HKLM\SOFTWARE\DDS\AuthBridge\HmacSecretPath. Delete the
# line to disable response-MAC signing (transition-only).
node_hmac_secret_path = 'C:\ProgramData\DDS\node-hmac.key'

# Trusted root identities (URNs of domain founders)
# These are set during domain initialization (dds-node init-domain)
# trusted_roots = []

# Bootstrap peers for initial mesh join
# bootstrap_peers = ['/ip4/192.168.1.10/tcp/4001/p2p/12D3KooW...']
