# DDS Alertmanager / Prometheus recording + alerting rules
#
# Phase E of docs/observability-plan.md. Pairs with the Prometheus
# `/metrics` endpoint shipped by `dds-node` on the `metrics_addr`
# listener (default `127.0.0.1:9495` once configured — opt-in).
#
# Two tiers:
#
#   1. **Active** — rules whose source metrics ship today
#      (Phase C audit subset: `dds_build_info`, `dds_uptime_seconds`,
#      `dds_audit_entries_total{action}`, `dds_audit_chain_length`,
#      `dds_audit_chain_head_age_seconds`, plus the Prometheus-built-in
#      `up{job=...}` scrape-health series). These rules are uncommented
#      and ready to load.
#
#   2. **Reference (commented)** — rules whose source metrics are still
#      open under Phase C (network / FIDO2 / store / HTTP). They are
#      kept verbatim so each Phase C follow-up can uncomment its tier
#      atomically — the rule expressions are the spec the metric must
#      satisfy. Do **not** uncomment these without confirming the
#      underlying metric ships in the `dds-node` build deployed to the
#      scrape target; an inert rule on a missing series silently never
#      fires, which is worse than no rule at all.
#
# Load with:
#
#   # prometheus.yml
#   rule_files:
#     - /etc/prometheus/rules/dds.rules.yml
#
# Prometheus 2.50+. Annotation/label conventions follow the
# Prometheus operator community standards: `severity` is one of
# {info, warning, critical}, `runbook_url` points at the docs
# section that explains the failure mode, `summary` is one line,
# `description` is multi-line and may template metric values.
#
# Tested with `promtool check rules dds.rules.yml`.

groups:

  # ---------------------------------------------------------------
  # Audit chain — the Z-3 regression tripwire. Active.
  # ---------------------------------------------------------------
  - name: dds-audit
    interval: 30s
    rules:

      - alert: DdsAuditChainStalled
        # Head age is exposed as a gauge in seconds. A sustained value
        # over 10 minutes on a live node means either (a) the node is
        # genuinely idle or (b) emit_local_audit regressed. Pair with
        # the audit-emissions-flat rule below to disambiguate: a node
        # whose head age climbs *and* whose emission rate is zero is
        # in case (b) — Z-3 has regressed.
        expr: dds_audit_chain_head_age_seconds > 600
        for: 5m
        labels:
          severity: warning
          plan: observability-plan.md#phase-e
          finding: Z-3
        annotations:
          summary: "DDS audit chain head is stale (>10m) on {{ $labels.instance }}"
          description: |
            `dds_audit_chain_head_age_seconds` on {{ $labels.instance }}
            has been > 600 for 5 minutes (current value:
            {{ $value | humanizeDuration }}). Either the node has
            genuinely been idle for that long, or the production
            emit_local_audit hooks have regressed and Z-3 has
            re-opened.

            Verify with: `dds-cli --node {{ $labels.instance }} audit verify`.
            If the chain verifies and is genuinely short, this is a
            false positive — silence on the per-instance label.
          runbook_url: "https://github.com/ABCD/dds/blob/main/docs/observability-plan.md#phase-a--wire-audit-emission-closes-z-3"

      - alert: DdsAuditEmissionsFlat
        # Audit entries should appear on any node that handles ingest
        # or HTTP admin traffic. A node whose entries-total counter
        # has not advanced for 30 minutes despite serving traffic is
        # the same regression DdsAuditChainStalled flags from the
        # other side; we keep both because the head-age check fires
        # earlier on a busy fleet but the rate-zero check survives a
        # node that received exactly one entry an hour ago and then
        # lost emission.
        #
        # `sum without(action)` collapses the per-action labels so the
        # alert is one line per node, not one per action. The 30m
        # window is long enough to absorb genuinely quiet nodes
        # (small domains overnight) — tighten the per-environment
        # silence window if you serve more steady traffic.
        expr: |
          sum without(action) (
            increase(dds_audit_entries_total[30m])
          ) == 0
          and on(instance)
          dds_uptime_seconds > 1800
        for: 30m
        labels:
          severity: info
          plan: observability-plan.md#phase-e
          finding: Z-3
        annotations:
          summary: "DDS audit entries flat for 30m on {{ $labels.instance }}"
          description: |
            No new audit entries have been emitted on
            {{ $labels.instance }} for 30 minutes despite the node
            being up for at least 30 minutes. Cross-check with
            DdsAuditChainStalled; both firing together is the strong
            Z-3 regression signal.
          runbook_url: "https://github.com/ABCD/dds/blob/main/docs/observability-plan.md#phase-a--wire-audit-emission-closes-z-3"

      - alert: DdsAuditRejectionSpike
        # Rejection rate over success rate: spike means an attacker is
        # probing the admission / token-ingest paths, OR a peer just
        # shipped a broken build. Either way the operator wants to
        # know — the absolute rate matters less than the ratio.
        # Numerator: rejections; denominator: successes + rejections.
        # Guarded against division-by-zero by the `> 0` denominator
        # filter.
        expr: |
          sum without(action) (
            rate(dds_audit_entries_total{action=~".+\\.rejected"}[5m])
          )
          /
          ignoring(action) group_left
          (
            sum without(action) (
              rate(dds_audit_entries_total[5m])
            ) > 0
          )
          > 0.5
        for: 10m
        labels:
          severity: warning
          plan: observability-plan.md#phase-e
        annotations:
          summary: "DDS rejection ratio >50% on {{ $labels.instance }}"
          description: |
            More than half of the audit entries on
            {{ $labels.instance }} over the last 5 minutes are
            *.rejected. Inspect with:

              dds-cli --node {{ $labels.instance }} audit tail \
                --action attest.rejected --action vouch.rejected \
                --action revoke.rejected --action burn.rejected

            Common causes: peer with bad clock (replay window), peer
            shipping a regressed build, or active probing.
          runbook_url: "https://github.com/ABCD/dds/blob/main/docs/observability-plan.md#phase-a--wire-audit-emission-closes-z-3"

  # ---------------------------------------------------------------
  # Process / scrape liveness. Active — these only depend on the
  # Prometheus `up` series and `dds_uptime_seconds`.
  # ---------------------------------------------------------------
  - name: dds-process
    interval: 30s
    rules:

      - alert: DdsNodeDown
        # Prometheus' built-in `up` series flips to 0 when a scrape
        # target is unreachable. On the dedicated `metrics_addr`
        # listener this catches a crashed dds-node; the API listener
        # may stay up if only the metrics task panicked (rare —
        # `serve` returns a fatal error in that case).
        expr: up{job="dds-node"} == 0
        for: 2m
        labels:
          severity: critical
          plan: observability-plan.md#phase-e
        annotations:
          summary: "dds-node /metrics scrape failing on {{ $labels.instance }}"
          description: |
            Prometheus has not been able to scrape
            {{ $labels.instance }} for 2 minutes. Check:

              - process: `systemctl status dds-node` (or equivalent);
              - listener: `ss -tlnp | grep 9495`;
              - readiness: `curl -fsS http://{{ $labels.instance }}/readyz`.
          runbook_url: "https://github.com/ABCD/dds/blob/main/docs/DDS-Admin-Guide.md"

      - alert: DdsNodeFlapping
        # Treat repeated short uptime as a crash loop. `dds_uptime_seconds`
        # resets to a small value on every process start; if it stays
        # below 5 minutes for more than 15 minutes wall-time the node
        # is restarting at least every 5 minutes.
        expr: dds_uptime_seconds < 300
        for: 15m
        labels:
          severity: warning
          plan: observability-plan.md#phase-e
        annotations:
          summary: "dds-node {{ $labels.instance }} restarting frequently"
          description: |
            `dds_uptime_seconds` on {{ $labels.instance }} has stayed
            below 300 for the last 15 minutes — the process is
            restarting at least every 5 minutes. Look at journalctl /
            stderr for the panic / config error driving the restart.
          runbook_url: "https://github.com/ABCD/dds/blob/main/docs/DDS-Admin-Guide.md"

      - alert: DdsBuildSkew
        # Two distinct `dds_build_info` versions present in the same
        # Prometheus indicates a partial fleet upgrade. Not always an
        # incident (rolling deploy) but worth a low-severity ping if
        # the skew persists past the typical deploy window.
        #
        # The metric also carries `git_sha` and `rust_version` labels
        # (added in dds-node follow-up #44). The alert intentionally
        # aggregates by `version` only — multiple git SHAs or rustc
        # versions on the same `version` are normal during a rebuild
        # rollout and would generate noise. Operators wanting a
        # per-SHA skew alert can copy this rule, swap `count by(version)`
        # for `count by(git_sha)`, and tune the `for:` window separately.
        expr: count(count by(version) (dds_build_info)) > 1
        for: 1h
        labels:
          severity: info
          plan: observability-plan.md#phase-e
        annotations:
          summary: "DDS fleet running mixed versions for >1h"
          description: |
            The fleet has been running more than one
            `dds_build_info{version=...}` for over an hour. If this is
            a rolling upgrade, ignore. Otherwise investigate why a
            host is pinned to an older release.

  # ---------------------------------------------------------------
  # Storage tier — `dds_store_writes_total{result}` ships in dds-node
  # follow-up #39 (observability-plan.md Phase C store-writes subset).
  # Active.
  # ---------------------------------------------------------------
  - name: dds-storage
    interval: 30s
    rules:

      - alert: DdsStoreWriteFailures
        # Any non-zero rate of `result!="ok"` is suspicious. The
        # `conflict` bucket fires for legitimate domain rejections
        # (duplicate operation id, FIDO2 sign-count replay) — those
        # are normal at low background rates but a sustained spike
        # is a probe / regression signal. The `fail` bucket fires
        # for redb plumbing errors (open / commit failure) and audit
        # chain breaks; any non-zero rate is a hard regression.
        # Operators wanting to tune severity can split the rule into
        # two — a `result="fail"`-only critical and a `result="conflict"`
        # warning — but v1 keeps a single rule keyed off the catalog
        # spec.
        expr: |
          rate(dds_store_writes_total{result!="ok"}[5m]) > 0
        for: 5m
        labels:
          severity: critical
          plan: observability-plan.md#phase-e
        annotations:
          summary: "DDS store write failures on {{ $labels.instance }}"
          description: |
            `dds_store_writes_total{result!="ok"}` on
            {{ $labels.instance }} has been advancing for 5 minutes.
            Inspect:

              - `result="conflict"` rate: legitimate at background
                volume (duplicate ops from gossip dedup, FIDO2 replay
                attempts on a noisy network), but a sustained spike
                means an adversarial scanner or a regressed peer
                build.
              - `result="fail"` rate: hard error path (redb commit
                failure, audit chain break, serialization regression).
                Cross-check with `dds-cli --node {{ $labels.instance }} \
                audit verify` — a chain break here surfaces in the
                `fail` bucket.
          runbook_url: "https://github.com/ABCD/dds/blob/main/docs/observability-plan.md#phase-c--prometheus-exposition-metrics"

  # ---------------------------------------------------------------
  # HTTP API caller identity — H-7 cutover regression tripwire.
  # Active. `dds_http_caller_identity_total` ships in dds-node
  # follow-up #24 (observability-plan.md Phase C HTTP-tier subset).
  # ---------------------------------------------------------------
  - name: dds-http
    interval: 30s
    rules:

      - alert: DdsLoopbackTcpAdminUsed
        # H-7 cutover regression alarm — see Claude_sec_review.md.
        # `kind="anonymous"` corresponds to `CallerIdentity::Anonymous`,
        # which is what the API listener sees when a client connects
        # over loopback TCP (no peer credentials available). Once a
        # deployment has been migrated to the UDS / named-pipe
        # transport with `trust_loopback_tcp_admin = false`, any
        # non-zero rate on this label is a regression — either a
        # forgotten config flag, a fallback path, or a process
        # accidentally talking to the API over TCP.
        #
        # Tune the deploy-window silence on environments still in the
        # cutover.
        expr: |
          rate(dds_http_caller_identity_total{kind="anonymous"}[5m]) > 0
        for: 5m
        labels:
          severity: warning
          plan: observability-plan.md#phase-e
          finding: H-7
        annotations:
          summary: "DDS loopback-TCP traffic on {{ $labels.instance }} after cutover"
          description: |
            `dds_http_caller_identity_total{kind="anonymous"}` on
            {{ $labels.instance }} has been advancing for 5 minutes —
            non-zero anonymous (loopback TCP) request rate post-cutover
            indicates either `trust_loopback_tcp_admin = true` is
            still set in `node.toml` or a client is bypassing the UDS
            / named pipe path.

            Check: `dds-cli --node {{ $labels.instance }} stats` for
            the active listener; review `node.toml`'s `[api_auth]`
            block; grep clients for `http://127.0.0.1:` URLs.
          runbook_url: "https://github.com/ABCD/dds/blob/main/docs/observability-plan.md#phase-c--prometheus-exposition-metrics"

  # ---------------------------------------------------------------
  # Network tier — `dds_admission_handshakes_total{result}` ships in
  # dds-node follow-up #29 and `dds_sync_payloads_rejected_total{reason}`
  # ships in follow-ups #37/#41 (observability-plan.md Phase C network
  # subsets). Active.
  # ---------------------------------------------------------------
  - name: dds-network
    interval: 30s
    rules:

      - alert: DdsAdmissionFailureSpike
        # H-12 inbound admission-handshake failures. `result="fail"`
        # collects the four hard-error branches in
        # `DdsNode::verify_peer_admission`: missing cert, cert CBOR
        # decode failure, system-clock read failure, and
        # `AdmissionCert::verify` rejecting the cert (signature /
        # domain id / peer id / expiry mismatch). All four are
        # regression signals — peer cert pipeline broken, clock skew,
        # or an active probe — so any non-zero rate is alertable.
        # The `result="revoked"` bucket is *excluded* on purpose:
        # revoked peers legitimately try to rejoin, and a non-zero
        # rate there is normal background noise rather than a
        # regression. Operators wanting to monitor probing pressure
        # should graph `dds_admission_handshakes_total{result="revoked"}`
        # directly.
        #
        # The original spec threshold (0.1/s) is dropped in favour of
        # the same `> 0` "any failure is bad" pattern used by
        # `DdsStoreWriteFailures` and `DdsLoopbackTcpAdminUsed`.
        # Operators with a fleet that has a non-trivial steady-state
        # cert-rotation gap can tighten the rate threshold without
        # renaming the rule.
        expr: |
          rate(dds_admission_handshakes_total{result="fail"}[5m]) > 0
        for: 5m
        labels:
          severity: warning
          plan: observability-plan.md#phase-e
          finding: H-12
        annotations:
          summary: "DDS admission failures on {{ $labels.instance }}"
          description: |
            `dds_admission_handshakes_total{result="fail"}` on
            {{ $labels.instance }} has been advancing for 5 minutes —
            inbound H-12 handshakes are failing on a hard-error branch
            (no cert, decode failure, clock read failure, or cert
            verify rejected on signature / domain id / peer id /
            expiry).

            Inspect:

              - `dds-cli --node {{ $labels.instance }} stats` for the
                connected-vs-admitted peer split;
              - peer system clock vs. dds-node clock (replay-window
                bound on the cert verify);
              - the issuing CA chain — a regressed cert-issuance
                pipeline shows up here before it shows up in any
                dataplane metric.
          runbook_url: "https://github.com/ABCD/dds/blob/main/docs/observability-plan.md#phase-c--prometheus-exposition-metrics"

      - alert: DdsSyncRejectsSpike
        # Per-reason sync-payload rejections — see the catalog entry
        # for `dds_sync_payloads_rejected_total{reason}` for the full
        # bucket semantics. `legacy_v1` = peer leaking pre-V2 tokens
        # while `network.allow_legacy_v1_tokens=false`;
        # `publisher_capability` = peer signing without the matching
        # `dds:policy-publisher-*` / `dds:software-publisher` vouch;
        # `replay_window` = clock skew or replay; the post-apply
        # `signature` / `duplicate_jti` / `graph` partition surfaces
        # tampered tokens, B-1 same-JTI replay, and trust-graph
        # rejection. None of these should fire at steady state on a
        # healthy fleet — any non-zero rate is alertable, matching
        # the same `> 0` posture used for `DdsStoreWriteFailures`.
        # The original spec threshold (0.5/s) is dropped in favour of
        # the catalog's "any rejection is suspicious" semantic;
        # operators with a noisy peer that needs cert renewal can
        # silence per-instance until the peer is fixed.
        expr: |
          rate(dds_sync_payloads_rejected_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
          plan: observability-plan.md#phase-e
        annotations:
          summary: "DDS sync rejections on {{ $labels.instance }}"
          description: |
            `dds_sync_payloads_rejected_total` on
            {{ $labels.instance }} has been advancing for 5 minutes.
            Per-reason buckets:

              - `legacy_v1`: peer build regression (pre-V2 tokens);
              - `publisher_capability`: peer signing without a
                publisher vouch;
              - `replay_window`: clock skew or replay attempt;
              - `signature`: token tamper (ed25519 verify failed);
              - `duplicate_jti`: B-1 same-JTI replay indicator;
              - `graph`: every other `TrustError` from
                `TrustGraph::add_token`.

            Cross-check with the audit chain on the same instance:

              dds-cli --node {{ $labels.instance }} audit tail \
                --action attest.rejected --action vouch.rejected \
                --action revoke.rejected --action burn.rejected
          runbook_url: "https://github.com/ABCD/dds/blob/main/docs/observability-plan.md#phase-c--prometheus-exposition-metrics"

  # ---------------------------------------------------------------
  # FIDO2 tier — `dds_fido2_assertions_total{result}` ships in
  # dds-node follow-up #34 (observability-plan.md Phase C FIDO2
  # subset). Active.
  # ---------------------------------------------------------------
  - name: dds-fido2
    interval: 30s
    rules:

      - alert: DdsFido2AssertionFailureSpike
        # FIDO2 assertion non-`ok` outcomes. Per the catalog,
        # `signature` = tampered assertion (ed25519 verify failed);
        # `rp_id` = cross-site assertion replay (RP-ID hash
        # mismatch); `up` = missing User-Present flag (synthetic
        # assertion attempt); `sign_count` = sign-counter rollback
        # (cloned authenticator); `other` = challenge / origin /
        # clientDataJSON / parsing rejection. None of these should
        # fire at steady state on a properly enrolled fleet — any
        # non-zero rate is alertable, matching the same `> 0`
        # posture used for `DdsStoreWriteFailures`. The original
        # spec threshold (0.05/s) is dropped in favour of the
        # catalog's "any FIDO2 failure is suspicious" semantic.
        #
        # Operators may tighten by partitioning the rule per
        # `result=` label (e.g. a critical-only rule on
        # `result="signature"` or `result="sign_count"` since those
        # are unambiguous tamper / cloning indicators) without
        # renaming the rule.
        expr: |
          rate(dds_fido2_assertions_total{result!="ok"}[5m]) > 0
        for: 5m
        labels:
          severity: warning
          plan: observability-plan.md#phase-e
        annotations:
          summary: "DDS FIDO2 assertion failures on {{ $labels.instance }}"
          description: |
            `dds_fido2_assertions_total{result!="ok"}` on
            {{ $labels.instance }} has been advancing for 5 minutes.
            Per-result buckets:

              - `signature`: tampered or wrong-key assertion
                (ed25519 verify failed);
              - `rp_id`: cross-site assertion replay (the
                `rp_id_hash` in the assertion did not match
                SHA-256(enrolled_rp_id));
              - `up`: missing User-Present flag (synthetic
                assertion attempt);
              - `sign_count`: sign-counter rollback (cloned
                authenticator candidate);
              - `other`: challenge / origin / clientDataJSON /
                parsing / clock-regression rejection.

            Cross-check with `dds_audit_entries_total{action=
            "attest.rejected"}` on the same instance and with
            `dds-cli --node {{ $labels.instance }} audit tail` for
            the corresponding rejected entries.
          runbook_url: "https://github.com/ABCD/dds/blob/main/docs/observability-plan.md#phase-c--prometheus-exposition-metrics"

  # ---------------------------------------------------------------
  # PQC encryption tier — Phase B metrics (B.11).
  # `dds_pq_envelope_decrypt_total{result}` and
  # `dds_pq_release_requests_total{result}` ship in dds-node
  # telemetry (observability-plan.md Phase B.11 / B.11 follow-on).
  # Active.
  # ---------------------------------------------------------------
  - name: dds-pqc
    interval: 30s
    rules:

      - alert: DdsPqcDecryptFailureSpike
        # Non-`ok` decrypt outcomes for enc-v3 gossip and sync envelopes.
        # `result="no_key"` = node hasn't received the publisher's epoch
        # key release yet (late-join recovery in progress — expected on
        # fresh reconnect for < 30s, sustained spike means the
        # EpochKeyRequest / late-join recovery path is broken or the
        # publisher's fan-out is not reaching this peer);
        # `result="aead_fail"` = ciphertext tampered or epoch key mismatch
        # (hard tamper signal on an enc-v3 domain — any non-zero rate is
        # a regression unless a peer is in mid-rotation).
        #
        # Operators may split this rule into two with different severities:
        # critical for `aead_fail` (hard tamper indicator) and warning for
        # `no_key` (transient but must self-heal within 30s via
        # EpochKeyRequest recovery).
        expr: |
          rate(dds_pq_envelope_decrypt_total{result!="ok"}[5m]) > 0
        for: 5m
        labels:
          severity: warning
          plan: pqc-phase-b-plan.md#b11
          finding: Z-1
        annotations:
          summary: "DDS PQC envelope decrypt failures on {{ $labels.instance }}"
          description: |
            `dds_pq_envelope_decrypt_total{result!="ok"}` on
            {{ $labels.instance }} has been advancing for 5 minutes.
            Per-result buckets:

              - `no_key`: epoch key not yet received from the publisher;
                should self-heal within 30s via EpochKeyRequest
                (late-join recovery). Sustained means recovery path
                is broken or fan-out is not reaching this peer.
              - `aead_fail`: ciphertext tampered or key mismatch —
                hard tamper / key-mismatch signal on an enc-v3 domain.

            Check `dds_pq_epoch_id` on the affected peer and the
            publisher for epoch alignment; inspect
            `dds_pq_release_requests_total{result="sent"}` to confirm
            EpochKeyRequest recovery is firing.
          runbook_url: "https://github.com/ABCD/dds/blob/main/docs/pqc-phase-b-plan.md"

      - alert: DdsPqcKeyRequestSpike
        # Sustained EpochKeyRequest spike. `result="sent"` means the
        # node is continuously requesting epoch keys — expected briefly
        # on join / re-join (one request per publisher per reconnect)
        # but a spike sustained over 10 minutes means late-join recovery
        # is not succeeding and the node is burning request budget.
        # `result="cooldown"` spiking means the per-publisher 30s
        # cooldown is being hit repeatedly — normal during a reconnect
        # storm; sustained means a deeper issue.
        # `result="not_admitted"` = publisher has no admitted peer entry
        # for the requester — H-12 admission may have failed.
        # `result="malformed_peer_id"` = bad peer ID in inbound
        # gossip — regression signal.
        expr: |
          rate(dds_pq_release_requests_total{result="sent"}[10m]) > 0.1
        for: 10m
        labels:
          severity: warning
          plan: pqc-phase-b-plan.md#b11
          finding: Z-1
        annotations:
          summary: "DDS PQC epoch-key requests elevated on {{ $labels.instance }}"
          description: |
            `dds_pq_release_requests_total{result="sent"}` on
            {{ $labels.instance }} has averaged > 0.1/s for the last
            10 minutes — late-join recovery is not completing and the
            node is continuously requesting epoch keys.

            Correlate with `dds_pq_envelope_decrypt_total{result="no_key"}`
            and `dds_admission_handshakes_total{result}` to distinguish
            between:

              - Epoch-fan-out delay (publisher not delivering releases
                after rotation — check `dds_pq_releases_emitted_total`);
              - H-12 admission failure (publisher doesn't recognise this
                peer — check `dds_admission_handshakes_total{result="fail"}`);
              - Network partition (peer connected but enc-v3 EpochKeyRequest
                / Response protocol is being dropped).
          runbook_url: "https://github.com/ABCD/dds/blob/main/docs/pqc-phase-b-plan.md"

  # ---------------------------------------------------------------
  # Reference rules — keyed off Phase C catalog metrics that have
  # not shipped yet. Each block is gated on a metric name that does
  # not exist today; uncomment the block once the corresponding
  # follow-up lands. **Do not load these as-is.**
  # ---------------------------------------------------------------
  #
  # - name: dds-network-deferred
  #   interval: 30s
  #   rules:
  #
  #     - alert: DdsSyncLagHigh
  #       expr: |
  #         histogram_quantile(0.99, sum by(le) (rate(dds_sync_lag_seconds_bucket[5m]))) > 60
  #       for: 10m
  #       labels: { severity: warning, plan: observability-plan.md#phase-c }
  #       annotations:
  #         summary: "DDS sync lag p99 > 60s on {{ $labels.instance }}"
  #         description: "p99 lag from peer op-timestamp to local apply > 60s — gossip / sync degraded."
  #
  # (DdsLoopbackTcpAdminUsed has shipped — see active group `dds-http`
