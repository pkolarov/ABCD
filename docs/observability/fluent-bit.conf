# DDS audit-log → SIEM forwarder reference config (fluent-bit)
#
# Phase B.3 of docs/observability-plan.md. Pairs with
# audit-event-schema.md (the on-wire JSONL contract) and is the
# fluent-bit equivalent of vector.toml — pick whichever your fleet
# already runs.
#
# Tested against fluent-bit 2.2+. Requires `dds-cli` on $PATH and a
# running `dds-node` reachable at $DDS_NODE_URL (defaults to the
# common loopback-TCP address; switch the `dds-cli` invocation in
# the [INPUT] block to a `unix:` / `pipe:` URL via `--node-url` if
# the node is not on loopback TCP).
#
# Run with:
#   fluent-bit --config /etc/fluent-bit/fluent-bit.conf

[SERVICE]
    Flush         5
    Log_Level     info
    Daemon        off
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020
    # Persist the watermark across fluent-bit restarts so the next
    # boot resumes from the same chain position rather than
    # re-tailing from $since=0.
    storage.path  /var/lib/fluent-bit/dds-audit/
    Parsers_File  parsers.conf

# -----------------------------------------------------------------------------
# Input: tail the local node's audit chain as JSONL.
# -----------------------------------------------------------------------------
#
# Why exec: `dds-cli audit tail` runs the local Ed25519 verify on
# every line *before* emitting it, so a forwarder cannot be tricked
# into shipping a line that the node did not actually sign. Reading
# the redb backing file directly would skip that verification and
# couple the forwarder to internal storage.
#
# fluent-bit's `exec` input does not auto-restart child processes;
# we lean on `--follow-interval 5` so dds-cli stays resident, and the
# fluent-bit process supervisor (systemd / k8s liveness) restarts
# the whole stack on a hard exit.
[INPUT]
    Name          exec
    Tag           dds.audit
    Command       dds-cli audit tail --format jsonl --follow-interval 5
    Parser        json
    Buf_Size      256k
    Interval_Sec  0
    storage.type  filesystem

# -----------------------------------------------------------------------------
# Filter: stamp severity per audit-event-schema.md §5.
# -----------------------------------------------------------------------------
#
# Rules in priority order; later rules override earlier ones. Keep
# `sig_ok=false` last so it always wins — see audit-event-schema.md
# §2 on why a `false` flag must not silently drop the line.
[FILTER]
    Name      modify
    Match     dds.audit
    Add       severity info
    Add       source dds-audit

[FILTER]
    Name      modify
    Match     dds.audit
    Condition Key_value_matches action ^(attest|vouch|revoke|burn|enroll\.|admin\.|apply\.).*\.rejected$
    Set       severity warning

[FILTER]
    Name      modify
    Match     dds.audit
    Condition Key_value_equals action apply.failed
    Set       severity warning

[FILTER]
    Name      modify
    Match     dds.audit
    Condition Key_value_equals action revoke
    Set       severity notice

[FILTER]
    Name      modify
    Match     dds.audit
    Condition Key_value_equals action burn
    Set       severity notice

[FILTER]
    Name      modify
    Match     dds.audit
    Condition Key_value_equals action admin.bootstrap
    Set       severity notice

[FILTER]
    Name      modify
    Match     dds.audit
    Condition Key_value_equals sig_ok false
    Set       severity alert

# Promote the audit `ts` (Unix seconds, as signed by the node) to
# the canonical fluent-bit timestamp so downstream sinks see a
# coherent time series.
[FILTER]
    Name      lua
    Match     dds.audit
    call      promote_ts
    code      function promote_ts(tag, timestamp, record) if record["ts"] ~= nil then return 1, record["ts"], record else return 0, timestamp, record end end

# -----------------------------------------------------------------------------
# Output (option A): Loki — the recommended default for a Grafana stack.
# -----------------------------------------------------------------------------
[OUTPUT]
    Name          loki
    Match         dds.audit
    Host          loki
    Port          3100
    Labels        app=dds, $action, $node_urn, $severity, $sig_ok
    Label_Keys    $action,$node_urn,$severity,$sig_ok
    Line_Format   json

# -----------------------------------------------------------------------------
# Output (option B): Splunk HEC. Uncomment + set the token via env.
# -----------------------------------------------------------------------------
# [OUTPUT]
#     Name          splunk
#     Match         dds.audit
#     Host          splunk.internal
#     Port          8088
#     TLS           On
#     TLS.Verify    On
#     Splunk_Token  ${SPLUNK_HEC_TOKEN}
#     Splunk_Send_Raw  Off
#     Event_Index   dds_audit
#     Event_Source  dds-cli-audit
#     Event_Sourcetype _json

# -----------------------------------------------------------------------------
# Output (option C): Elasticsearch. Daily index pattern for ILM.
# -----------------------------------------------------------------------------
# [OUTPUT]
#     Name           es
#     Match          dds.audit
#     Host           elastic.internal
#     Port           9200
#     TLS            On
#     HTTP_User      ${ELASTIC_USER}
#     HTTP_Passwd    ${ELASTIC_PASSWORD}
#     Logstash_Format On
#     Logstash_Prefix dds-audit
#     Logstash_DateFormat %Y.%m.%d
#     Time_Key       ts
#     Time_Key_Format %s
#     Replace_Dots   On

# -----------------------------------------------------------------------------
# Output (option D): rsyslog forwarding for shops on a syslog spine.
# Use this when the SIEM ingest point is a syslog daemon, not an
# HTTP endpoint. Parses `severity` into a syslog facility.local0..7.
# -----------------------------------------------------------------------------
# [OUTPUT]
#     Name      syslog
#     Match     dds.audit
#     Host      syslog.internal
#     Port      514
#     Mode      tcp
#     Syslog_Format       rfc5424
#     Syslog_Hostname_Key host
#     Syslog_Appname_Key  source
#     Syslog_Message_Key  action
#     Syslog_Severity_Key severity
#     Syslog_Facility     local0

# Parsers live in a sibling parsers.conf — fluent-bit requires
# `[PARSER]` blocks in the file referenced by `Parsers_File`. See
# parsers.conf in this directory.
