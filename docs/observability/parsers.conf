# DDS audit-log parsers for fluent-bit.
#
# Referenced by fluent-bit.conf via `Parsers_File parsers.conf`.
# fluent-bit requires [PARSER] blocks to live in a file referenced by
# the SERVICE.Parsers_File directive — they are not valid in the main
# configuration file.

[PARSER]
    Name        json
    Format      json
    Time_Key    ts
    Time_Format %s
    Time_Keep   On
