name: MSI Installer

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'platform/windows/**'
      - 'dds-node/**'
      - 'dds-core/**'
      - 'dds-domain/**'
      - 'dds-store/**'
      - 'dds-net/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/msi.yml'
  pull_request:
    paths:
      - 'platform/windows/**'
      - 'dds-node/**'
      - 'dds-core/**'
      - 'dds-domain/**'
      - 'dds-store/**'
      - 'dds-net/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/msi.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'MSI version (e.g. 1.0.0.0)'
        required: false
        default: '1.0.0.0'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-msi:
    name: MSI (x64)
    runs-on: windows-latest
    # NOTE: ARM64 MSI is built locally via Build-Msi.ps1 -Platform arm64
    # GitHub does not offer hosted Windows ARM64 runners; cross-compiling
    # the ring crate from x64→ARM64 is unreliable. Add an ARM64 matrix
    # entry here once a self-hosted ARM64 runner is available.
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}

    steps:
      - uses: actions/checkout@v4

      # ── Compute version ──────────────────────────────────────────
      - name: Compute version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.version }}" -ne "") {
            $v = "${{ inputs.version }}"
          } elseif ("${{ github.ref_type }}" -eq "tag") {
            # Strip leading 'v' from tag: v1.2.3 -> 1.2.3.0
            $tag = "${{ github.ref_name }}" -replace '^v', ''
            $parts = $tag -split '\.'
            while ($parts.Count -lt 4) { $parts += '0' }
            $v = $parts[0..3] -join '.'
          } else {
            $v = "0.0.0.${{ github.run_number }}"
          }
          echo "version=$v" >> $env:GITHUB_OUTPUT
          Write-Host "MSI Version: $v"

      # ── Rust ─────────────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          key: msi-x64

      - name: Build dds-node (x86_64-pc-windows-msvc)
        run: cargo build --package dds-node --target x86_64-pc-windows-msvc --release

      # ── C++ native ──────────────────────────────────────────────
      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build C++ native (x64)
        run: >
          msbuild platform\windows\native\DdsNative.sln
          /p:Configuration=Release
          /p:Platform=x64
          /m
          /verbosity:minimal

      # ── .NET ─────────────────────────────────────────────────────
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish DdsPolicyAgent (win-x64)
        run: >
          dotnet publish platform\windows\DdsPolicyAgent\DdsPolicyAgent.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --framework net9.0
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          --output stage\dotnet

      # ── Stage binaries ───────────────────────────────────────────
      - name: Stage binaries
        shell: pwsh
        run: |
          $stage = "stage\x64"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null

          # Rust
          Copy-Item "target\x86_64-pc-windows-msvc\release\dds-node.exe" $stage

          # C++ native
          $nativeBuild = "platform\windows\native\build\Release"
          @("DdsAuthBridge.exe", "DdsCredentialProvider.dll", "DdsTrayAgent.exe") | ForEach-Object {
            $src = Join-Path $nativeBuild $_
            if (Test-Path $src) { Copy-Item $src $stage }
            else { Write-Warning "Not found: $src" }
          }

          # .NET
          Copy-Item "stage\dotnet\DdsPolicyAgent.exe" $stage

          Write-Host "Staged binaries:"
          Get-ChildItem $stage | Format-Table Name, Length

      # ── WiX MSI ──────────────────────────────────────────────────
      - name: Install WiX
        run: dotnet tool install --global wix --version 5.0.2

      - name: Build MSI (x64)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path out -Force | Out-Null
          $msiName = "DDS-${{ steps.version.outputs.version }}-x64.msi"
          wix build platform\windows\installer\DdsBundle.wxs `
            -o "out\$msiName" `
            -d BuildDir="stage\x64" `
            -d ConfigDir="platform\windows\installer\config" `
            -d Platform="x64" `
            -d Version="${{ steps.version.outputs.version }}" `
            -arch x64
          Write-Host "Built: out\$msiName"
          Get-ChildItem out\*.msi | Format-Table Name, @{N='Size (MB)';E={[math]::Round($_.Length/1MB,1)}}

      # ── Authenticode signing (when certificate is available) ──────
      - name: Sign binaries (Authenticode)
        if: env.SIGN_CERT != ''
        shell: pwsh
        env:
          SIGN_CERT: ${{ secrets.SIGN_CERT_BASE64 }}
          SIGN_CERT_PASSWORD: ${{ secrets.SIGN_CERT_PASSWORD }}
          SIGN_TIMESTAMP_URL: http://timestamp.digicert.com
        run: |
          # Decode the PFX certificate from base64
          $certPath = [System.IO.Path]::GetTempFileName() + ".pfx"
          [System.Convert]::FromBase64String($env:SIGN_CERT) | Set-Content $certPath -AsByteStream

          # Sign each binary and the MSI
          $filesToSign = @(
            "stage\x64\dds-node.exe",
            "stage\x64\DdsAuthBridge.exe",
            "stage\x64\DdsCredentialProvider.dll",
            "stage\x64\DdsPolicyAgent.exe",
            "stage\x64\DdsTrayAgent.exe"
          ) + @(Get-ChildItem "out\*.msi" | ForEach-Object { $_.FullName })

          foreach ($file in $filesToSign) {
            if (Test-Path $file) {
              & signtool sign /f $certPath /p $env:SIGN_CERT_PASSWORD `
                /tr $env:SIGN_TIMESTAMP_URL /td sha256 /fd sha256 `
                /d "DDS Windows Platform" $file
              Write-Host "Signed: $file"
            }
          }

          # Clean up
          Remove-Item $certPath -Force

      # ── Validate MSI ─────────────────────────────────────────────
      - name: Validate MSI
        shell: pwsh
        run: |
          $msi = Get-ChildItem "out\*.msi" | Select-Object -First 1
          if (-not $msi) { throw "No MSI found in out\" }

          # Basic size sanity check (MSI should be > 1 MB with all binaries)
          $sizeMB = [math]::Round($msi.Length / 1MB, 1)
          Write-Host "MSI size: $sizeMB MB"
          if ($msi.Length -lt 1MB) { throw "MSI suspiciously small: $sizeMB MB" }

          # Validate with wix
          wix msi validate $msi.FullName
          Write-Host "MSI validation passed"

      # ── SHA-256 checksums ────────────────────────────────────────
      - name: Generate SHA-256 checksums
        shell: pwsh
        run: |
          $checksumFile = "out\SHA256SUMS.txt"
          Get-ChildItem "out\*.msi" | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($_.Name)" | Tee-Object -Append -FilePath $checksumFile
          }
          Write-Host "Checksums:"
          Get-Content $checksumFile

      # ── SLSA subject hashes ─────────────────────────────────────
      # supply-chain-plan.md Phase C.1 — compute SHA-256 over each MSI
      # and base64-encode the subjects so the provenance job can sign them.
      - name: Compute artifact hashes
        id: hash
        shell: pwsh
        run: |
          $lines = Get-ChildItem "out\*.msi" | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($_.Name)"
          }
          $raw = $lines -join "`n"
          $encoded = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($raw))
          "hashes=$encoded" | Out-File -Append -FilePath $env:GITHUB_OUTPUT
          Write-Host "SLSA subjects: $raw"

      # ── Upload artifact ──────────────────────────────────────────
      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: DDS-MSI-x64
          path: |
            out/*.msi
            out/SHA256SUMS.txt
          if-no-files-found: error

  # ── SLSA Level 3 provenance ─────────────────────────────────────
  # supply-chain-plan.md Phase C.1 — generate an in-toto SLSA Level 3
  # provenance attestation for every MSI produced by build-msi.
  # The attestation is signed by GitHub's OIDC-backed Sigstore Fulcio
  # identity and uploaded as a workflow artifact and (on tags) as a
  # release asset alongside the MSI.
  #
  # Pin by commit SHA rather than semver tag for supply-chain safety;
  # update the SHA when bumping the generator version.
  provenance:
    needs: [build-msi]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.build-msi.outputs.hashes }}"
      upload-assets: ${{ startsWith(github.ref, 'refs/tags/v') }}

  # ── Sigstore cosign signing (tags only) ──────────────────────────
  # supply-chain-plan.md Phase C.5 — keyless cosign sign-blob using
  # GitHub Actions OIDC as the Fulcio identity.  Each MSI gets a
  # <name>.bundle file (certificate + signature + Rekor tlog entry).
  #
  # Operators can verify any released MSI with:
  #   cosign verify-blob \
  #     --bundle DDS-1.0.0.0-x64.msi.bundle \
  #     --certificate-identity-regexp \
  #       "https://github.com/.*/\.github/workflows/msi\.yml@.*" \
  #     --certificate-oidc-issuer \
  #       "https://token.actions.githubusercontent.com" \
  #     DDS-1.0.0.0-x64.msi
  sign:
    name: Sign with cosign
    needs: [build-msi]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for keyless OIDC Fulcio signing
      contents: read
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Download MSI artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: DDS-MSI-*
          merge-multiple: true

      - name: Sign MSI artifacts
        working-directory: artifacts
        run: |
          for f in *.msi; do
            cosign sign-blob --bundle "${f}.bundle" "$f"
            echo "Signed: $f  →  ${f}.bundle"
          done

      - name: Upload signature bundles
        uses: actions/upload-artifact@v4
        with:
          name: cosign-bundles-msi
          path: artifacts/*.bundle
          if-no-files-found: error

  # ── Release job (only on tags) ─────────────────────────────────
  release:
    name: Create Release
    needs: [build-msi, provenance, sign]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all MSI artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: DDS-MSI-*
          merge-multiple: true

      - name: Download provenance attestations
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: "*.intoto.jsonl"
          merge-multiple: true

      - name: Download cosign bundles
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: cosign-bundles-msi
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.msi
            artifacts/SHA256SUMS.txt
            artifacts/*.intoto.jsonl
            artifacts/*.bundle
          generate_release_notes: true
          draft: true
