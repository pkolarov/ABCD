name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libudev-dev
      - run: cargo test --workspace --all-features

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libudev-dev
      - run: cargo clippy --workspace --all-targets -- -D warnings

  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  python:
    name: python bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: cargo build -p dds-ffi --release
      - run: pip install pytest
      - working-directory: bindings/python
        run: pytest -v

  cross-windows:
    name: cross-compile windows-gnu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y mingw-w64
      - run: cargo check --workspace --target x86_64-pc-windows-gnu

  cross-android:
    name: cross-compile aarch64-linux-android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@v2
      - uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
      - run: cargo install cargo-ndk
      - run: cargo ndk -t arm64-v8a build -p dds-ffi --release

  benches:
    name: cargo bench --no-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libudev-dev
      - run: cargo bench --workspace --no-run

  sbom:
    # supply-chain-plan.md Phase C.2 — CycloneDX SBOM generation.
    # Generates a machine-readable software bill of materials on every
    # PR and push to main and uploads it as a workflow artifact so it
    # can be attached to a GitHub Release by the release workflow.
    name: generate SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-cyclonedx
      - run: sudo apt-get update && sudo apt-get install -y libudev-dev
      - name: Generate CycloneDX SBOM
        run: cargo cyclonedx --format json --all
      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: "**/*.cdx.json"
          if-no-files-found: error

  audit:
    # supply-chain-plan.md Phase C.4 — cargo audit on every PR + push.
    # Default behaviour: exit non-zero on any RUSTSEC vulnerability advisory.
    # Informational warnings (unmaintained / unsound / yanked) surface in
    # the log but do not block — the eight currently-tracked warnings are
    # upstream-blocked transitive deps documented in security-gaps.md
    # "Dependency Audit Gap". When upstream releases land, graduate this
    # step to `-D warnings` so a fresh advisory immediately surfaces a PR.
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit

  vet:
    # supply-chain-plan.md Phase C.3 — cargo-vet baseline.
    # All pre-existing deps are exempted in supply-chain/config.toml.
    # Any new dependency added after this job landed must be audited
    # (or explicitly exempted with justification) — CI fails otherwise.
    name: cargo vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-vet
      - run: cargo vet

  # cross-embedded: thumbv7em-none-eabihf removed — dds-core dependencies
  # pull in std; re-enable after no_std audit (not in pilot scope)

  windows-native:
    name: windows native components
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # ---- Rust workspace (MSVC target) ----
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          key: windows-msvc
      - name: Build Rust workspace (x86_64-pc-windows-msvc)
        run: cargo build --workspace --target x86_64-pc-windows-msvc
      - name: Test Rust workspace (x86_64-pc-windows-msvc)
        run: cargo test --workspace --target x86_64-pc-windows-msvc

      # ---- C++ native components (MSBuild) ----
      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2
      - name: Build C++ native solution (x64 Debug)
        run: msbuild platform\windows\native\DdsNative.sln /p:Configuration=Debug /p:Platform=x64 /m

      # ---- C++ unit tests ----
      - name: Build C++ native tests
        working-directory: platform\windows\native\Tests
        run: .\build_tests.bat
      - name: Run C++ native tests
        working-directory: platform\windows\native\Tests
        run: .\run_all_tests.bat

      # ---- .NET DdsPolicyAgent (both net8.0 and net9.0) ----
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
      - name: Build DdsPolicyAgent (net8.0 + net9.0)
        run: dotnet build platform\windows\DdsPolicyAgent\DdsPolicyAgent.csproj -c Debug
      - name: Test DdsPolicyAgent (net8.0)
        run: dotnet test platform\windows\DdsPolicyAgent.Tests\DdsPolicyAgent.Tests.csproj -c Debug --framework net8.0 --filter "Category!=Integration"
      - name: Test DdsPolicyAgent (net9.0)
        run: dotnet test platform\windows\DdsPolicyAgent.Tests\DdsPolicyAgent.Tests.csproj -c Debug --framework net9.0 --filter "Category!=Integration"

      # ---- MSI compile verification ----
      - name: Build dds-node (release, for MSI staging)
        run: cargo build -p dds-node --target x86_64-pc-windows-msvc --release
      - name: Install WiX
        run: dotnet tool install --global wix --version 5.0.2
      - name: Publish DdsPolicyAgent for MSI staging
        run: >
          dotnet publish platform\windows\DdsPolicyAgent\DdsPolicyAgent.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --framework net9.0
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          --output stage\dotnet
      - name: Build C++ native (x64 Release)
        run: >
          msbuild platform\windows\native\DdsNative.sln
          /p:Configuration=Release
          /p:Platform=x64
          /m
          /verbosity:minimal
      - name: Stage binaries for MSI
        shell: pwsh
        run: |
          $stage = "stage\x64"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          Copy-Item "target\x86_64-pc-windows-msvc\release\dds-node.exe" $stage -ErrorAction Stop
          $nativeBuild = "platform\windows\native\build\Release"
          @("DdsAuthBridge.exe", "DdsCredentialProvider.dll", "DdsTrayAgent.exe") | ForEach-Object {
            $src = Join-Path $nativeBuild $_
            if (Test-Path $src) { Copy-Item $src $stage }
            else { Write-Warning "Not found: $src" }
          }
          Copy-Item "stage\dotnet\DdsPolicyAgent.exe" $stage
          # Copy installer-side PS1 scripts (mirroring Build-Msi.ps1 step 3.5)
          Get-ChildItem "platform\windows\installer\scripts" -Filter "*.ps1" | ForEach-Object {
            Copy-Item $_.FullName $stage -Force
          }
          Write-Host "Staged binaries:"
          Get-ChildItem $stage | Format-Table Name, Length
      - name: Verify MSI compiles
        shell: pwsh
        run: |
          wix build platform\windows\installer\DdsBundle.wxs `
            -o "out\DDS-ci-verify-x64.msi" `
            -d BuildDir="stage\x64" `
            -d ConfigDir="platform\windows\installer\config" `
            -d Platform="x64" `
            -d Version="0.0.0.0" `
            -arch x64
          $msi = Get-Item "out\DDS-ci-verify-x64.msi"
          Write-Host "MSI compiled: $($msi.Name), size: $([math]::Round($msi.Length/1MB,1)) MB"
          if ($msi.Length -lt 1MB) { throw "MSI too small — likely missing binaries" }

      # ---- E2E smoke test ----
      - name: Run Windows E2E smoke test
        shell: pwsh
        env:
          # Reuse the workspace test artifacts under target\x86_64-pc-windows-msvc.
          # CARGO_INCREMENTAL=0 keeps cp_fido_e2e from blowing the runner's
          # disk by writing fresh per-crate incremental caches.
          CARGO_INCREMENTAL: "0"
        run: |
          & platform\windows\e2e\smoke_test.ps1 `
            -NodeBinary "target\x86_64-pc-windows-msvc\debug\dds-node.exe" `
            -CliBinary  "target\x86_64-pc-windows-msvc\debug\dds.exe" `
            -Target     "x86_64-pc-windows-msvc"
          if ($LASTEXITCODE -ne 0) { throw "Smoke test failed with exit code $LASTEXITCODE" }

  linux-agent:
    name: Linux .NET policy agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Build Linux DdsPolicyAgent
        run: dotnet build platform/linux/DdsPolicyAgent/DdsPolicyAgent.Linux.csproj -c Debug
      - name: Test Linux DdsPolicyAgent
        run: dotnet test platform/linux/DdsPolicyAgent.Tests/DdsPolicyAgent.Linux.Tests.csproj -c Debug --logger "console;verbosity=normal"

  macos-agent:
    name: macOS .NET policy agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Build macOS DdsPolicyAgent
        run: dotnet build platform/macos/DdsPolicyAgent/DdsPolicyAgent.MacOS.csproj -c Debug
      - name: Test macOS DdsPolicyAgent
        run: dotnet test platform/macos/DdsPolicyAgent.Tests/DdsPolicyAgent.MacOS.Tests.csproj -c Debug --logger "console;verbosity=normal"
